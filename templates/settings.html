<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>🏌️ Anlagen</title>
    <style>
        * { box-sizing: border-box; }
        :root { --bg: #FAFAF7; --card:#fff; --line:#e6e7e1; --tile:#edefe8; --ink: #222222; --ink-2:#5b5f58; --ink-3:#8a8f88; --ink-4:#a0a49d; --muted:#c2c6bf; --green: #21B458; }
        html, body { margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; -webkit-font-smoothing:antialiased; }
        .wrap { max-width:480px; margin:0 auto; padding:18px 18px 40px; }
        .head { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
        .back { width:40px; height:40px; border-radius:12px; background:var(--card); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .back svg { width:20px; height:20px; }
        .head .t { font-size:21px; font-weight:600; }
        .hint { font-size:14px; color:var(--ink-2); margin-bottom:16px; }
        .prow { display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px 15px; margin-bottom:10px; cursor:pointer; }
        .pin { width:40px; height:40px; border-radius:11px; background:var(--tile); color:var(--ink-3); display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
        .pin svg { width:21px; height:21px; }
        .pinfo { flex:1; min-width:0; }
        .pname { font-size:17px; font-weight:600; }
        .badge { font-size:11px; font-weight:600; color:var(--green); background:#eaf3ee; border-radius:6px; padding:2px 7px; margin-left:7px; vertical-align:1px; }
        .psub { font-size:13px; color:var(--ink-3); }
        .chev { color:var(--muted); }
        .chev svg { width:20px; height:20px; }
        .add { width:100%; height:52px; border:1.5px dashed #cdd0c8; border-radius:14px; background:transparent; color:var(--green); font-size:16px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; margin-top:6px; }
        .add svg { width:18px; height:18px; }
        .empty { text-align:center; color:var(--ink-4); font-size:14px; padding:26px 0; }

        .sheet-ov { position:fixed; inset:0; background:rgba(20,25,20,0.4); display:flex; align-items:flex-end; z-index:40; opacity:0; pointer-events:none; transition:opacity .18s; }
        .sheet-ov.show { opacity:1; pointer-events:auto; }
        .sheet { width:100%; max-width:480px; margin:0 auto; background:var(--card); border-radius:22px 22px 0 0; padding:18px 18px 26px; transform:translateY(100%); transition:transform .22s; }
        .sheet-ov.show .sheet { transform:translateY(0); }
        .sheet-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
        .sheet-title { font-size:18px; font-weight:600; }
        .sheet-x { width:30px; height:30px; display:flex; align-items:center; justify-content:center; color:var(--ink-3); cursor:pointer; }
        .sheet-x svg { width:22px; height:22px; }
        .sysbadge { font-size:10px; font-weight:700; letter-spacing:.5px; border-radius:6px; padding:1px 6px; margin-left:6px; }
        .sysbadge.ch { color:#0d9488; background:#d3f0eb; }
        .sysbadge.de { color:#2563eb; background:#dbe7fb; }
        .seg { display:flex; gap:8px; margin-bottom:4px; }
        .seg-btn { flex:1; height:46px; border-radius:12px; border:1.5px solid var(--line); background:var(--card); font-size:15px; font-weight:600; color:var(--ink-3); cursor:pointer; }
        .seg-btn.on { border-color:var(--green); background:#eaf6ee; color:var(--green); }
        .field-label { font-size:12px; letter-spacing:1px; color:var(--ink-4); margin:2px 0 7px; }
        input.in { width:100%; height:48px; border:1px solid var(--line); border-radius:12px; padding:0 13px; font-size:16px; margin-bottom:16px; }
        input.in:focus { outline:none; border-color:var(--green); box-shadow:0 0 0 3px rgba(22,163,74,0.12); }
        .btn { border:none; border-radius:13px; font-size:15px; font-weight:600; cursor:pointer; height:48px; display:flex; align-items:center; justify-content:center; }
        .btn-green { background:var(--green); color:#fff; }
        .btn-ghost { background:var(--card); border:1px solid var(--line); color:var(--ink-2); }
        .actions { display:flex; gap:10px; }
        .actions .btn { flex:1; }
        .link.del { color:#c0392b; font-size:13px; background:none; border:none; cursor:pointer; }
        .toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; font-size:14px; padding:9px 16px; border-radius:20px; opacity:0; transition:all .2s; z-index:60; pointer-events:none; }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="head">
            <div class="back" onclick="location.href='/'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
            <div class="t">Anlagen</div>
        </div>
        <div class="hint">Deine Minigolf-Plätze — anlegen, umbenennen, Bahnenzahl anpassen.</div>
        <div id="list"></div>
        <button class="add" id="addPlace"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>Anlage hinzufügen</button>
    </div>

    <div id="sheetOv" class="sheet-ov"><div id="sheet" class="sheet"></div></div>
    <div id="toast" class="toast"></div>

    <script>
    var PLACES = [], editing = null, selSys = 'CH';
    function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
    function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(function(){t.classList.remove('show');},1500); }
    function pinSvg(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8c0 4.5-6 10-6 10S6 12.5 6 8a6 6 0 0 1 12 0Z"/><circle cx="12" cy="8" r="2"/></svg>'; }

    function render(){
        var list=document.getElementById('list');
        if(!PLACES.length){ list.innerHTML='<div class="empty">Noch keine Anlagen.</div>'; return; }
        list.innerHTML = PLACES.map(function(p){
            return '<div class="prow" data-id="'+p.id+'">'
                +'<span class="pin">'+pinSvg()+'</span>'
                +'<div class="pinfo"><div class="pname">'+esc(p.name)+(p.is_default?'<span class="badge">Standard</span>':'')+'</div>'
                +'<div class="psub">'+p.track_count+' Bahnen<span class="sysbadge '+((p.system==='DE')?'de">DE':'ch">CH')+'</span></div></div>'
                +'<span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></span></div>';
        }).join('');
        list.querySelectorAll('[data-id]').forEach(function(el){ el.onclick=function(){ openSheet(PLACES.filter(function(x){return x.id==el.dataset.id;})[0]); }; });
    }

    function openSheet(place){
        editing = place;
        selSys = (place && place.system==='DE') ? 'DE' : 'CH';
        var sheet=document.getElementById('sheet');
        sheet.innerHTML =
            '<div class="sheet-head"><div class="sheet-title">'+(place?'Anlage bearbeiten':'Neue Anlage')+'</div><div class="sheet-x" id="sx"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></div></div>'
            +'<div class="field-label">NAME</div><input class="in" id="pn" placeholder="z.B. Bülach" maxlength="100" value="'+(place?esc(place.name):'')+'">'
            +'<div class="field-label">ANZAHL BAHNEN</div><input class="in" id="pc" type="number" min="1" max="50" inputmode="numeric" value="'+(place?place.track_count:18)+'">'
            +'<div class="field-label">SYSTEM / TYP</div><div class="seg" id="seg">'
            +  '<button type="button" class="seg-btn" data-sys="CH">CH · Beton</button>'
            +  '<button type="button" class="seg-btn" data-sys="DE">DE · Eternit</button></div>'
            +'<div class="actions"><button class="btn btn-ghost" id="cancel">Abbrechen</button><button class="btn btn-green" id="save">Speichern</button></div>'
            +(place && !place.is_default ? '<div style="text-align:center;margin-top:14px;"><button class="link del" id="del">Anlage löschen</button></div>' : '');
        function paintSeg(){ sheet.querySelectorAll('.seg-btn').forEach(function(b){ b.classList.toggle('on', b.dataset.sys===selSys); }); }
        sheet.querySelectorAll('.seg-btn').forEach(function(b){ b.onclick=function(){ selSys=b.dataset.sys; paintSeg(); }; });
        paintSeg();
        document.getElementById('sx').onclick=closeSheet;
        document.getElementById('cancel').onclick=closeSheet;
        document.getElementById('save').onclick=save;
        if(place && !place.is_default) document.getElementById('del').onclick=del;
        document.getElementById('sheetOv').classList.add('show');
    }
    function closeSheet(){ document.getElementById('sheetOv').classList.remove('show'); editing=null; }

    async function save(){
        var name=(document.getElementById('pn').value||'').trim();
        var count=parseInt(document.getElementById('pc').value)||18;
        if(!name){ toast('Bitte einen Namen eingeben'); return; }
        try {
            var res, data;
            if(editing){
                res=await fetch('/api/places/'+editing.id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:name, track_count:count, system:selSys}) });
            } else {
                res=await fetch('/api/places', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:name, track_count:count, system:selSys}) });
            }
            data=await res.json();
            if(data.status!=='success') throw new Error(data.message||'Fehler');
            closeSheet(); toast('Gespeichert'); await load();
        } catch(e){ console.error(e); toast('⚠️ '+(e.message||'Nicht gespeichert')); }
    }
    async function del(){
        if(!editing) return;
        if(!confirm('Anlage „'+editing.name+'" wirklich löschen?')) return;
        try {
            var res=await fetch('/api/places/'+editing.id, { method:'DELETE' });
            var data=await res.json();
            if(data.status!=='success') throw new Error(data.message||'Fehler');
            closeSheet(); toast('Gelöscht'); await load();
        } catch(e){ console.error(e); toast('⚠️ Nicht gelöscht'); }
    }

    async function load(){
        try { var res=await fetch('/api/places'); var data=await res.json(); PLACES=data.places||[]; render(); }
        catch(e){ document.getElementById('list').innerHTML='<div class="empty">Anlagen konnten nicht geladen werden.</div>'; }
    }
    document.getElementById('addPlace').onclick=function(){ openSheet(null); };
    document.getElementById('sheetOv').addEventListener('click', function(e){ if(e.target.id==='sheetOv') closeSheet(); });
    load();
    </script>
</body>
</html>
