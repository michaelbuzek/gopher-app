<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Gopher Minigolf">
    <title>🏌️ Neues Spiel</title>
    <style>
        * { box-sizing: border-box; }
        :root { --bg:#f5f6f2; --card:#fff; --line:#e6e7e1; --tile:#edefe8; --ink:#1c1d1a; --ink-2:#5b5f58; --ink-3:#8a8f88; --ink-4:#a0a49d; --muted:#c2c6bf; --green:#16a34a; }
        html, body { margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; -webkit-font-smoothing:antialiased; }
        .wrap { max-width:480px; margin:0 auto; padding:18px 18px 40px; }
        .head { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
        .back { width:40px; height:40px; border-radius:12px; background:var(--card); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .back svg { width:20px; height:20px; }
        .head .t { font-size:21px; font-weight:600; }
        .field-label { display:flex; align-items:center; gap:7px; font-size:13px; letter-spacing:.3px; color:var(--ink-3); font-weight:600; margin:0 0 8px 2px; }
        .field-label svg { width:16px; height:16px; }
        .block { margin-bottom:20px; }
        input.in { width:100%; height:52px; border:1px solid var(--line); border-radius:14px; padding:0 15px; font-size:16px; background:var(--card); color:var(--ink); }
        input.in:focus { outline:none; border-color:var(--green); box-shadow:0 0 0 3px rgba(22,163,74,0.12); }
        .pwrap { position:relative; }
        .dropdown { position:absolute; left:0; right:0; top:calc(100% + 4px); z-index:20; background:#fff; border:1px solid var(--line); border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,0.10); max-height:250px; overflow-y:auto; display:none; }
        .ditem { padding:12px 14px; font-size:15px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:10px; border-bottom:1px solid var(--line); }
        .ditem:last-child { border-bottom:none; }
        .ditem:hover, .ditem:active { background:var(--tile); }
        .ditem .dtc { font-size:12px; color:var(--ink-3); white-space:nowrap; }
        .players { border:1px solid var(--line); border-radius:16px; padding:12px; background:#fbfcfa; }
        .prow { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
        .prow .av { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:600; flex:0 0 auto; overflow:hidden; }
        .prow .av img { width:100%; height:100%; object-fit:cover; }
        .prow.prof { cursor:pointer; user-select:none; }
        .prow .pname { flex:1; font-size:16px; font-weight:500; }
        .prow .chk { width:26px; height:26px; border-radius:50%; border:1.5px solid var(--muted); display:flex; align-items:center; justify-content:center; flex:0 0 auto; color:#fff; }
        .prow .chk svg { width:15px; height:15px; }
        .prow .av.gav { background:#eceee7; color:#8a8f88; }
        .prow input { flex:1; height:48px; border:1px solid var(--line); border-radius:12px; padding:0 13px; font-size:16px; background:var(--card); }
        .prow input:focus { outline:none; border-color:var(--green); box-shadow:0 0 0 3px rgba(22,163,74,0.10); }
        .prow .rm { width:34px; height:34px; border-radius:10px; border:none; background:transparent; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
        .prow .rm svg { width:18px; height:18px; }
        .add-p { width:100%; height:46px; border:1.5px dashed #cdd0c8; border-radius:12px; background:transparent; color:var(--green); font-size:15px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; }
        .add-p svg { width:17px; height:17px; }
        .add-p:disabled { opacity:.45; cursor:default; }
        .start { width:100%; height:58px; border:none; border-radius:16px; background:var(--green); color:#fff; font-size:18px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:9px; margin-top:8px; }
        .start svg { width:20px; height:20px; }
        .start:disabled { opacity:.6; cursor:default; }
        .err { display:none; background:#fdecea; color:#c0392b; border-radius:12px; padding:11px 14px; font-size:14px; margin-bottom:16px; }
        .err.show { display:block; }
        .hint { font-size:12px; color:var(--ink-4); margin:7px 2px 0; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="head">
            <div class="back" onclick="location.href='/'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
            <div class="t">Neues Spiel</div>
        </div>

        <div id="err" class="err"></div>

        <div class="block">
            <div class="field-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8c0 4.5-6 10-6 10S6 12.5 6 8a6 6 0 0 1 12 0Z"/><circle cx="12" cy="8" r="2"/></svg>Minigolf-Platz</div>
            <div class="pwrap"><input class="in" id="place" placeholder="z.B. Bülach" autocomplete="off" value="Bülach"><div id="placeDrop" class="dropdown"></div></div>
            <div class="hint">Neuen Platz einfach eintippen — er wird gemerkt.</div>
        </div>

        <div class="block">
            <div class="field-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Datum</div>
            <input class="in" type="date" id="date">
        </div>

        <div class="block">
            <div class="field-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3v18M5 4h13l-2 4 2 4H5"/></svg>Anzahl Bahnen</div>
            <input class="in" type="number" id="tracks" value="18" min="1" max="50" inputmode="numeric">
        </div>

        <div class="block">
            <div class="field-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>Spieler</div>
            <div class="players">
                <div id="prows"></div>
                <button type="button" class="add-p" id="addP"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>Weiterer Spieler</button>
            </div>
        </div>

        <button class="start" id="start"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Spiel starten</button>
    </div>

    <script>
    var PLACES = [], PROFILES = [], selectedPlaceId = null;
    var PROFILE_SEL = {}, guests = [];  // Profile: name->ausgewählt; guests: freie Zusatzspieler
    var CHK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
    var MAX = 6;

    function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
    function avatarFile(name){ var n=(name||'').trim().toLowerCase(); return (n==='umpa'||n==='lumpa') ? '/static/avatars/'+n+'.png' : null; }
    function avInner(name){ var initial=esc((name||'').charAt(0).toUpperCase()); var f=avatarFile(name); return f ? '<img src="'+f+'" alt="" onerror="this.parentNode.textContent=\''+initial+'\'">' : initial; }
    function tint(hex){ var h=(hex||'').replace('#',''); if(h.length<6) return '#eef0ea'; var r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16),m=function(x){return Math.round(255-(255-x)*0.16);}; return 'rgb('+m(r)+','+m(g)+','+m(b)+')'; }
    function profileFor(name){ return PROFILES.filter(function(p){return p.name.toLowerCase()===(name||'').trim().toLowerCase();})[0]||null; }
    function showErr(msg){ var e=document.getElementById('err'); e.textContent=msg; e.classList.add('show'); }
    function clearErr(){ document.getElementById('err').classList.remove('show'); }

    function renderPlayers(){
        var box=document.getElementById('prows');
        var html='';
        PROFILES.forEach(function(p){
            var sel=PROFILE_SEL[p.name], c=p.color_hex||'#16a34a';
            html += '<div class="prow prof" data-prof="'+esc(p.name)+'" style="opacity:'+(sel?1:0.5)+';">'
                + '<span class="av" style="background:'+tint(c)+';color:'+c+';">'+avInner(p.name)+'</span>'
                + '<span class="pname">'+esc(p.name)+'</span>'
                + '<span class="chk" style="'+(sel?'background:'+c+';border-color:'+c+';':'')+'">'+(sel?CHK:'')+'</span></div>';
        });
        guests.forEach(function(g, i){
            var initial=(g.name||'?').trim().charAt(0).toUpperCase()||'?';
            html += '<div class="prow">'
                + '<span class="av gav">'+esc(initial)+'</span>'
                + '<input data-gi="'+i+'" value="'+esc(g.name)+'" placeholder="Gastname" maxlength="100">'
                + '<button class="rm" data-rm="'+i+'" title="Entfernen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>';
        });
        box.innerHTML=html;
        box.querySelectorAll('[data-prof]').forEach(function(el){ el.addEventListener('click', function(){ var n=el.getAttribute('data-prof'); PROFILE_SEL[n]=!PROFILE_SEL[n]; renderPlayers(); }); });
        box.querySelectorAll('input[data-gi]').forEach(function(el){ el.addEventListener('input', function(){ guests[parseInt(el.dataset.gi)].name=el.value; var av=el.previousElementSibling; av.textContent=(el.value||'?').trim().charAt(0).toUpperCase()||'?'; }); });
        box.querySelectorAll('[data-rm]').forEach(function(el){ el.addEventListener('click', function(){ guests.splice(parseInt(el.dataset.rm),1); renderPlayers(); }); });
        document.getElementById('addP').disabled = (PROFILES.length + guests.length) >= MAX;
    }

    function matchPlace(){
        var val=(document.getElementById('place').value||'').trim().toLowerCase();
        var pl=PLACES.filter(function(p){return p.name.toLowerCase()===val;})[0];
        if(pl){ selectedPlaceId=pl.id; document.getElementById('tracks').value=pl.track_count; }
        else { selectedPlaceId=null; }
    }

    document.getElementById('addP').addEventListener('click', function(){ if((PROFILES.length+guests.length)<MAX){ guests.push({name:''}); renderPlayers(); var ins=document.querySelectorAll('#prows input[data-gi]'); if(ins.length) ins[ins.length-1].focus(); } });
    var placeEl = document.getElementById('place'), placeDrop = document.getElementById('placeDrop');
    function showDrop(items){
        if(!items.length){ placeDrop.style.display='none'; return; }
        placeDrop.innerHTML = items.map(function(p){ return '<div class="ditem" data-name="'+esc(p.name)+'" data-id="'+p.id+'" data-tc="'+p.track_count+'"><span>'+esc(p.name)+'</span><span class="dtc">'+p.track_count+' Bahnen</span></div>'; }).join('');
        placeDrop.style.display='block';
        placeDrop.querySelectorAll('.ditem').forEach(function(el){ el.addEventListener('mousedown', function(ev){ ev.preventDefault(); placeEl.value=el.dataset.name; selectedPlaceId=parseInt(el.dataset.id); document.getElementById('tracks').value=el.dataset.tc; placeDrop.style.display='none'; }); });
    }
    var placeStash = '';
    placeEl.addEventListener('focus', function(){
        // Beim Reinklicken das vorausgewählte Wort (z.B. Bülach) leeren -> gleich Dropdown/eigene Eingabe
        if(this.value){ placeStash=this.value; this.value=''; selectedPlaceId=null; }
        showDrop(PLACES);
    });
    placeEl.addEventListener('blur', function(){
        // Nichts gewählt/getippt -> Default (Bülach) wiederherstellen, damit er nicht verloren geht
        if(!placeEl.value && placeStash){ placeEl.value=placeStash; matchPlace(); }
        placeStash='';
    });
    placeEl.addEventListener('input', function(){ placeStash=''; matchPlace(); var v=this.value.toLowerCase(); showDrop(PLACES.filter(function(p){return p.name.toLowerCase().indexOf(v)>=0;})); });
    document.addEventListener('click', function(e){ if(e.target!==placeEl && !placeDrop.contains(e.target)) placeDrop.style.display='none'; });

    document.getElementById('start').addEventListener('click', async function(){
        clearErr();
        var place=(document.getElementById('place').value||'').trim();
        var date=document.getElementById('date').value;
        var track_count=parseInt(document.getElementById('tracks').value)||18;
        if(!place){ showErr('Bitte einen Minigolf-Platz eingeben.'); return; }
        if(!date){ showErr('Bitte ein Datum wählen.'); return; }
        var names = [];
        PROFILES.forEach(function(p){ if(PROFILE_SEL[p.name]) names.push(p.name); });
        guests.forEach(function(g){ var n=(g.name||'').trim(); if(n) names.push(n); });
        if(!names.length){ showErr('Mindestens ein Spieler erforderlich.'); return; }
        var btn=this; btn.disabled=true; btn.style.opacity='0.7';
        try {
            var res=await fetch('/save', { method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ place:place, date:date, track_count:track_count, place_id:selectedPlaceId, players:names.map(function(n){return {name:n};}) }) });
            var data=await res.json();
            if(data.code==='active_game_exists' && data.active_game_id){
                // Es läuft schon eine Runde -> dorthin statt neue anzulegen
                location.href='/score/'+data.active_game_id;
                return;
            }
            if(data.status!=='success') throw new Error(data.message||'Fehler beim Speichern');
            location.href='/score/'+data.game_id;
        } catch(e){ console.error(e); showErr(e.message||'Unbekannter Fehler'); btn.disabled=false; btn.style.opacity='1'; }
    });

    async function init(){
        // Datum = heute
        var d=new Date(); var iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        document.getElementById('date').value=iso;
        // Profile (für Standard-Spieler + Farben)
        try { var rp=await fetch('/api/profiles'); var dp=await rp.json(); PROFILES=dp.profiles||[]; } catch(e){}
        if(!PROFILES.length) PROFILES = [{name:'Umpa',color_hex:'#16a34a'},{name:'Lumpa',color_hex:'#e0672e'}];
        PROFILES.forEach(function(p){ PROFILE_SEL[p.name]=true; });
        renderPlayers();
        // Plätze für Autocomplete
        try {
            var r=await fetch('/api/places'); var data=await r.json(); PLACES=data.places||[];
            matchPlace();
        } catch(e){}
    }
    init();
    </script>
</body>
</html>
