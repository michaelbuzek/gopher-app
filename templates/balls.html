<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>🏌️ Meine Bälle</title>
    <style>
        * { box-sizing: border-box; }
        :root { --bg: #FAFAF7; --card:#fff; --line:#e6e7e1; --tile:#edefe8; --ink: #222222; --ink-2:#5b5f58; --ink-3:#8a8f88; --ink-4:#a0a49d; --muted:#c2c6bf; --green: #21B458; }
        html, body { margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; -webkit-font-smoothing:antialiased; }
        .wrap { max-width:480px; margin:0 auto; padding:18px 18px 40px; }
        .head { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
        .back { width:40px; height:40px; border-radius:12px; background:var(--card); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .back svg { width:20px; height:20px; }
        .head .t { font-size:20px; font-weight:600; }
        .head .who { font-size:13px; font-weight:600; }
        .head .av { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:600; }
        .hint { display:flex; align-items:center; gap:7px; background:#eaf3ee; border-radius:10px; padding:9px 12px; font-size:13px; color:#3b6d3f; margin-bottom:16px; }
        .hint svg { width:16px; height:16px; flex:0 0 auto; }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .bcard { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 12px; display:flex; flex-direction:column; align-items:center; gap:10px; position:relative; cursor:pointer; }
        .bcard .pen { position:absolute; top:9px; right:10px; color:var(--muted); }
        .bcard .pen svg { width:15px; height:15px; }
        .thumb { width:56px; height:56px; border-radius:50%; overflow:hidden; display:flex; align-items:center; justify-content:center; background:#eef0ea; }
        .thumb img { width:100%; height:100%; object-fit:cover; }
        .dot { width:44px; height:44px; border-radius:50%; position:relative; border:1px solid rgba(0,0,0,0.06); }
        .dot .hl { position:absolute; top:8px; left:9px; width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,0.7); }
        .bcard .lbl { font-size:14px; font-weight:600; text-align:center; word-break:break-word; }
        .bcard .bdesc { font-size:12px; color:var(--ink-3); text-align:center; line-height:1.3; }
        .add { border:1.5px dashed #cdd0c8; background:var(--card); color:var(--green); border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; min-height:120px; cursor:pointer; }
        .add svg { width:26px; height:26px; }
        .add span { font-size:14px; font-weight:600; }

        .sheet-ov { position:fixed; inset:0; background:rgba(20,25,20,0.4); display:flex; align-items:flex-end; z-index:40; opacity:0; pointer-events:none; transition:opacity .18s; }
        .sheet-ov.show { opacity:1; pointer-events:auto; }
        .sheet { width:100%; max-width:480px; margin:0 auto; background:var(--card); border-radius:22px 22px 0 0; padding:18px 18px 26px; max-height:90vh; overflow-y:auto; transform:translateY(100%); transition:transform .22s; }
        .sheet-ov.show .sheet { transform:translateY(0); }
        .sheet-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
        .sheet-title { font-size:18px; font-weight:600; }
        .sheet-x { width:30px; height:30px; display:flex; align-items:center; justify-content:center; color:var(--ink-3); cursor:pointer; }
        .sheet-x svg { width:22px; height:22px; }
        .preview-row { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
        .preview { width:64px; height:64px; border-radius:50%; overflow:hidden; background:#eef0ea; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
        .preview img { width:100%; height:100%; object-fit:cover; }
        .photo-btns { display:flex; flex-direction:column; gap:6px; }
        .field-label { font-size:12px; letter-spacing:1px; color:var(--ink-4); margin:2px 0 7px; }
        input[type=text] { width:100%; height:44px; border:1px solid var(--line); border-radius:12px; padding:0 13px; font-size:15px; margin-bottom:14px; }
        .swatches { display:flex; flex-wrap:wrap; gap:9px; margin-bottom:18px; }
        .sw { width:32px; height:32px; border-radius:50%; border:2px solid transparent; cursor:pointer; }
        .sw.sel { border-color:var(--ink-3); }
        .btn { border:none; border-radius:13px; font-size:15px; font-weight:600; cursor:pointer; height:48px; display:flex; align-items:center; justify-content:center; gap:7px; }
        .btn svg { width:17px; height:17px; }
        .btn-green { background:var(--green); color:#fff; }
        .btn-ghost { background:var(--card); border:1px solid var(--line); color:var(--ink-2); }
        .btn-danger { background:#fff; border:1px solid #f0c0c0; color:#c0392b; }
        .link { font-size:13px; color:var(--ink-3); cursor:pointer; background:none; border:none; padding:0; text-align:left; }
        .link.del { color:#c0392b; }
        .actions { display:flex; gap:10px; }
        .actions .btn { flex:1; }
        .toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; font-size:14px; padding:9px 16px; border-radius:20px; opacity:0; transition:all .2s; z-index:60; pointer-events:none; }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        .empty { text-align:center; color:var(--ink-4); font-size:14px; padding:30px 0; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="head">
            <div class="back" onclick="location.href='/'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
            <div style="flex:1;"><div class="t">Meine Bälle</div><div class="who" id="whoLbl"></div></div>
            <div class="av" id="whoAv"></div>
        </div>
        <div class="hint"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>Jeden Ball mit Foto, Name und Farbe — bequem zu Hause</div>
        <div id="grid" class="grid"></div>
    </div>

    <div id="sheetOv" class="sheet-ov"><div id="sheet" class="sheet"></div></div>
    <input type="file" id="fileIn" accept="image/*" style="display:none;">
    <input type="file" id="fileCam" accept="image/*" capture="environment" style="display:none;">
    <div id="toast" class="toast"></div>

    <script>
    var COLORS = ['#ffffff','#111827','#6b7280','#92400e','#dc2626','#f97316','#eab308','#22c55e','#10b981','#06b6d4','#7fd0e8','#2563eb','#8b5cf6','#ec4899','#e5e7eb'];
    var PLAYER = null, PCOLOR = '#16a34a', BALLS = [], editing = null, pending = { color:'#22c55e', image:undefined };

    function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
    function tint(hex){ var h=(hex||'').replace('#',''); if(h.length<6) return '#eef0ea'; var r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16),m=function(x){return Math.round(255-(255-x)*0.16);}; return 'rgb('+m(r)+','+m(g)+','+m(b)+')'; }
    function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(function(){t.classList.remove('show');},1500); }

    function ballVisual(b, size){
        if (b && b.image_data) return '<div class="thumb" style="width:'+size+'px;height:'+size+'px;"><img src="'+b.image_data+'" alt=""></div>';
        var c = (b && b.color_hex) || '#d7d9d2';
        return '<div class="dot" style="width:'+size+'px;height:'+size+'px;background:'+c+';"><span class="hl"></span></div>';
    }

    function renderGrid(){
        var g = document.getElementById('grid');
        var cards = BALLS.map(function(b){
            return '<div class="bcard" data-id="'+b.id+'"><span class="pen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></span>'
                + ballVisual(b, 56) + '<div class="lbl">'+esc(b.label)+'</div>'
                + (b.description ? '<div class="bdesc">'+esc(b.description)+'</div>' : '') + '</div>';
        }).join('');
        var add = '<div class="add" id="addBall"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg><span>Ball anlegen</span></div>';
        g.innerHTML = cards + add;
        if (!BALLS.length) g.insertAdjacentHTML('beforebegin', '');
        g.querySelectorAll('[data-id]').forEach(function(el){ el.onclick=function(){ openSheet(BALLS.filter(function(x){return x.id==el.dataset.id;})[0]); }; });
        document.getElementById('addBall').onclick=function(){ openSheet(null); };
    }

    function openSheet(ball){
        editing = ball;
        pending = { color: ball ? (ball.color_hex || '#22c55e') : '#22c55e', image: undefined }; // undefined = unverändert
        var curImg = ball ? ball.image_data : null;
        var sheet = document.getElementById('sheet');
        var swatches = COLORS.map(function(hex){ return '<div class="sw'+(hex===pending.color?' sel':'')+'" data-sw="'+hex+'" style="background:'+hex+';"></div>'; }).join('');
        sheet.innerHTML =
            '<div class="sheet-head"><div class="sheet-title">'+(ball?'Ball bearbeiten':'Neuer Ball')+'</div><div class="sheet-x" id="sx"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></div></div>'
            +'<div class="preview-row"><div class="preview" id="prev">'+previewInner(curImg, pending.color)+'</div>'
            +'<div class="photo-btns"><div style="display:flex;gap:8px;">'
            +'<button class="btn btn-ghost" id="camBtn" style="height:40px;padding:0 12px;font-size:14px;"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>Aufnehmen</button>'
            +'<button class="btn btn-ghost" id="photoBtn" style="height:40px;padding:0 12px;font-size:14px;"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>Hochladen</button></div>'
            +'<button class="link" id="rmPhoto" style="margin-top:6px;'+(curImg?'':'display:none;')+'">Foto entfernen</button></div></div>'
            +'<div class="field-label">NAME</div><input type="text" id="lbl" placeholder="z.B. Migo blau, springender Ball" maxlength="100" value="'+(ball?esc(ball.label):'')+'">'
            +'<div class="field-label">FARBE</div><div class="swatches" id="sw">'+swatches+'</div>'
            +'<div class="field-label">BESCHREIBUNG (OPTIONAL)</div><textarea id="desc" placeholder="z.B. hart, springt gut, für lange Bahnen" style="width:100%;min-height:64px;border:1px solid var(--line);border-radius:12px;padding:10px 13px;font-size:14px;font-family:inherit;resize:vertical;margin-bottom:16px;">'+(ball?esc(ball.description||''):'')+'</textarea>'
            +'<div class="actions"><button class="btn btn-ghost" id="cancel">Abbrechen</button><button class="btn btn-green" id="save">Speichern</button></div>'
            +(ball?'<div style="text-align:center;margin-top:14px;"><button class="link del" id="del">Ball löschen</button></div>':'');
        document.getElementById('sx').onclick=closeSheet;
        document.getElementById('cancel').onclick=closeSheet;
        document.getElementById('save').onclick=saveBall;
        document.getElementById('photoBtn').onclick=function(){ document.getElementById('fileIn').click(); };
        document.getElementById('camBtn').onclick=function(){ document.getElementById('fileCam').click(); };
        document.getElementById('rmPhoto').onclick=function(){ pending.image=''; document.getElementById('prev').innerHTML=previewInner(null, pending.color); document.getElementById('rmPhoto').style.display='none'; };
        if (ball) document.getElementById('del').onclick=deleteBall;
        sheet.querySelectorAll('[data-sw]').forEach(function(el){ el.onclick=function(){ pending.color=el.dataset.sw; sheet.querySelectorAll('.sw').forEach(function(s){s.classList.remove('sel');}); el.classList.add('sel'); if(pending.image===undefined?!curImg:!pending.image) document.getElementById('prev').innerHTML=previewInner(null,pending.color); }; });
        document.getElementById('sheetOv').classList.add('show');
    }
    function previewInner(img, color){ if(img) return '<img src="'+img+'" alt="">'; return '<div class="dot" style="width:46px;height:46px;background:'+(color||'#d7d9d2')+';"><span class="hl"></span></div>'; }
    function closeSheet(){ document.getElementById('sheetOv').classList.remove('show'); editing=null; }

    function onPhotoPicked(e){
        var f=e.target.files && e.target.files[0]; if(!f) return;
        resizeImage(f, 320, function(dataUrl){
            pending.image = dataUrl;
            document.getElementById('prev').innerHTML = previewInner(dataUrl, pending.color);
            var rm=document.getElementById('rmPhoto'); if(rm) rm.style.display='';
        });
        e.target.value='';
    }
    document.getElementById('fileIn').onchange=onPhotoPicked;
    document.getElementById('fileCam').onchange=onPhotoPicked;
    function resizeImage(file, maxSize, cb){
        var reader=new FileReader();
        reader.onload=function(ev){ var img=new Image(); img.onload=function(){
            var w=img.width,h=img.height;
            if(w>h){ if(w>maxSize){ h=Math.round(h*maxSize/w); w=maxSize; } } else { if(h>maxSize){ w=Math.round(w*maxSize/h); h=maxSize; } }
            var cv=document.createElement('canvas'); cv.width=w; cv.height=h; cv.getContext('2d').drawImage(img,0,0,w,h);
            cb(cv.toDataURL('image/jpeg',0.82));
        }; img.src=ev.target.result; };
        reader.readAsDataURL(file);
    }

    async function saveBall(){
        var label=(document.getElementById('lbl').value||'').trim();
        if(!label){ toast('Bitte einen Namen eingeben'); return; }
        try {
            var res, data;
            var desc=(document.getElementById('desc').value||'').trim();
            if(editing){
                var body={ label:label, color_hex:pending.color, description:desc };
                if(pending.image!==undefined) body.image_data=pending.image; // '' entfernt, dataUrl setzt
                res=await fetch('/api/balls/'+editing.id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
            } else {
                var body2={ player_name:PLAYER, label:label, color_hex:pending.color, description:desc };
                if(pending.image) body2.image_data=pending.image;
                res=await fetch('/api/balls', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body2) });
            }
            data=await res.json();
            if(data.status!=='success') throw new Error(data.message||'Fehler');
            closeSheet(); toast('Gespeichert'); await loadBalls();
        } catch(e){ console.error(e); toast('⚠️ '+(e.message||'Nicht gespeichert')); }
    }
    async function deleteBall(){
        if(!editing) return;
        if(!confirm('Ball „'+editing.label+'" wirklich löschen?')) return;
        try {
            var res=await fetch('/api/balls/'+editing.id, { method:'DELETE' });
            var data=await res.json();
            if(data.status!=='success') throw new Error(data.message||'Fehler');
            closeSheet(); toast('Gelöscht'); await loadBalls();
        } catch(e){ console.error(e); toast('⚠️ Nicht gelöscht'); }
    }

    async function loadBalls(){
        var res=await fetch('/api/balls?player_name='+encodeURIComponent(PLAYER));
        var data=await res.json();
        BALLS=data.balls||[];
        renderGrid();
    }

    async function init(){
        var param=new URLSearchParams(location.search).get('player');
        PLAYER = param || localStorage.getItem('gopher_profile') || null;
        // Profilfarbe holen (und Fallback-Spieler, falls keiner gesetzt)
        try {
            var res=await fetch('/api/profiles'); var data=await res.json();
            var profs=data.profiles||[];
            if(!PLAYER && profs.length) PLAYER=profs[0].name;
            var p=profs.filter(function(x){return x.name===PLAYER;})[0];
            if(p) PCOLOR=p.color_hex||'#16a34a';
        } catch(e){}
        if(!PLAYER){ document.getElementById('grid').innerHTML='<div class="empty">Kein Profil gewählt.</div>'; return; }
        document.getElementById('whoLbl').textContent=PLAYER;
        document.getElementById('whoLbl').style.color=PCOLOR;
        var av=document.getElementById('whoAv'); av.textContent=PLAYER.charAt(0).toUpperCase(); av.style.background=tint(PCOLOR); av.style.color=PCOLOR;
        await loadBalls();
    }
    document.getElementById('sheetOv').addEventListener('click', function(e){ if(e.target.id==='sheetOv') closeSheet(); });
    init();
    </script>
</body>
</html>
