<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Gopher Minigolf">
    <title>🏌️ Gopher Minigolf - Score Eingabe</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg: #f5f6f2;
            --card: #ffffff;
            --line: #e6e7e1;
            --line-soft: #eef0ea;
            --tile: #edefe8;
            --ink: #1c1d1a;
            --ink-2: #5b5f58;
            --ink-3: #8a8f88;
            --ink-4: #a0a49d;
            --muted: #c2c6bf;
            --green: #16a34a;
        }
        html, body {
            margin: 0; padding: 0; background: var(--bg); color: var(--ink);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .wrap { max-width: 480px; margin: 0 auto; padding: 16px 16px 28px; min-height: 100vh; min-height: 100svh; display: flex; flex-direction: column; }
        /* Safe-Area + sichtbare Viewport-Höhe: auf Mobile (Safari-Leiste, iPhone-Home-Indicator) wird unten nichts mehr abgeschnitten */
        @supports (padding: max(0px)) { .wrap { padding-bottom: max(28px, calc(env(safe-area-inset-bottom) + 12px)); } }
        .loc { display: flex; align-items: center; gap: 5px; color: var(--green); font-weight: 600; font-size: 16px; }
        .loc svg { width: 18px; height: 18px; }
        .sub { font-size: 13px; color: var(--ink-3); margin: 3px 0 16px; }
        .section-label { font-size: 12px; letter-spacing: 1px; color: var(--ink-3); font-weight: 600; }

        .row-between { display: flex; align-items: center; justify-content: space-between; }
        .pill-btn { display: inline-flex; align-items: center; gap: 5px; background: var(--card); border: 1px solid var(--line);
            border-radius: 20px; padding: 6px 12px; font-size: 14px; color: var(--ink-2); cursor: pointer; }
        .pill-btn svg { width: 16px; height: 16px; }
        .link-green { display: inline-flex; align-items: center; gap: 5px; color: var(--green); font-size: 14px; font-weight: 600; cursor: pointer; }
        .link-green svg { width: 15px; height: 15px; }

        /* --- Scorecard cards --- */
        .pcard { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 14px; margin-bottom: 12px; }
        .pcard.lead { border-width: 2px; }
        .pcard-head { display: flex; align-items: center; gap: 11px; margin-bottom: 12px; cursor: pointer; }
        .rank { font-size: 15px; color: var(--ink-4); font-weight: 600; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .pname { font-size: 18px; font-weight: 600; }
        .pmeta { margin-left: auto; display: flex; align-items: baseline; gap: 6px; }
        .pmeta .tot { font-size: 26px; font-weight: 600; }
        .pmeta .frac { font-size: 13px; color: var(--ink-4); }
        .grid9 { display: grid; grid-template-columns: repeat(9, 1fr); gap: 6px; }
        .htile { background: var(--tile); border-radius: 8px; padding: 5px 0 6px; text-align: center; cursor: pointer; }
        .htile .hn { font-size: 11px; color: var(--ink-4); line-height: 1.3; }
        .htile .hv { font-size: 15px; font-weight: 600; }

        /* --- Stand blocks --- */
        .stand { display: flex; gap: 10px; }
        .sblock { flex: 1; background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 14px; text-align: center; }
        .sblock .nm { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .sblock .bt { font-size: 30px; font-weight: 600; }
        .sblock .av { font-size: 12px; color: var(--ink-3); margin-top: 2px; }

        .spacer { flex: 1 1 auto; min-height: 14px; }
        .btn { border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; height: 52px;
            display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .btn svg { width: 18px; height: 18px; }
        .btn-green { background: var(--green); color: #fff; }
        .btn-ghost { background: var(--card); border: 1px solid var(--line); color: var(--ink-2); }
        .btn-text { background: transparent; color: var(--ink-3); font-weight: 400; font-size: 14px; height: 46px; }

        /* --- Detail view --- */
        .idbadge { display: flex; align-items: center; gap: 11px; margin-bottom: 14px; }
        .idbadge .pname { font-size: 21px; }
        .idbadge .gesamt { margin-left: auto; text-align: right; }
        .idbadge .gesamt .lbl { font-size: 11px; color: var(--ink-4); }
        .idbadge .gesamt .val { font-size: 20px; font-weight: 600; }

        .holenav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .navbtn { width: 50px; height: 50px; border-radius: 15px; background: var(--card); border: 1px solid var(--line);
            display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .navbtn svg { width: 24px; height: 24px; }
        .navbtn.off { opacity: 0.4; pointer-events: none; }
        .holenum { text-align: center; }
        .holenum .k { font-size: 12px; letter-spacing: 2px; color: var(--ink-3); }
        .holenum .n { font-size: 48px; font-weight: 600; line-height: 1.05; }
        .holenum .v { font-size: 13px; color: var(--ink-3); }

        .dcard { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 16px; flex: 1 1 auto; display: flex; flex-direction: column; }
        .caption { text-align: center; font-size: 13px; color: var(--ink-3); margin-bottom: 6px; }
        .stepper { display: flex; align-items: center; justify-content: center; gap: 18px; margin-bottom: 18px; }
        .step { width: 58px; height: 58px; border-radius: 16px; font-size: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
        .step-minus { background: #f2f3ee; border: 1px solid var(--line); color: var(--ink-2); }
        .step-plus { background: #e7f6ec; border: 1px solid #b9e3c6; color: var(--green); }
        .score-big { font-size: 42px; font-weight: 600; min-width: 50px; text-align: center; }

        .field-label { font-size: 12px; letter-spacing: 1px; color: var(--ink-4); margin-bottom: 7px; }
        .ball-row, .note-row { display: flex; align-items: center; gap: 11px; background: #f7f8f4; border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; cursor: pointer; }
        .note-row { align-items: flex-start; cursor: pointer; }
        .ball-name { flex: 1; font-size: 15px; font-weight: 600; }
        .ball-name.empty { color: var(--ink-4); font-weight: 400; }
        .balltile { width: 40px; height: 40px; border-radius: 10px; background: #eef0ea; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; overflow: hidden; }
        .balltile img { width: 100%; height: 100%; object-fit: cover; }
        .balldot { border-radius: 50%; position: relative; }
        .balldot .hl { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.65); }
        .alt-row { display: flex; align-items: center; gap: 8px; color: var(--green); font-size: 14px; padding: 4px 4px; cursor: pointer; }
        .alt-row svg { width: 16px; height: 16px; }
        .note-txt { flex: 1; font-size: 14px; color: var(--ink-2); }
        .note-txt.empty { color: var(--ink-4); }
        .note-row svg { width: 17px; height: 17px; color: var(--ink-4); margin-top: 1px; }
        .icon-pencil { width: 17px; height: 17px; color: var(--ink-4); flex: 0 0 auto; }

        /* --- Bahn-Statistik (pro Anlage, pro Spieler) --- */
        .tstats-wrap { margin-top: auto; padding-top: 12px; }
        .tstats-lbl { font-size: 11px; letter-spacing: 1px; color: var(--ink-4); margin-bottom: 7px; display: flex; align-items: center; gap: 5px; }
        .tstats-lbl svg { width: 13px; height: 13px; }
        .tstats { display: flex; align-items: baseline; gap: 20px; }
        .tstat { display: flex; align-items: baseline; gap: 6px; }
        .tstat .tk { font-size: 11px; letter-spacing: .5px; color: var(--ink-4); text-transform: uppercase; }
        .tstat .tv { font-size: 20px; font-weight: 600; line-height: 1; }
        .tstats-empty { font-size: 12px; color: var(--ink-4); }

        .holebar { display: flex; gap: 3px; margin-bottom: 6px; }
        .hseg { flex: 1; border-radius: 3px; cursor: pointer; align-self: center; }
        .bar-legend { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--ink-3); }

        /* --- Winner --- */
        .winner-wrap { flex: 1 1 auto; display: flex; flex-direction: column; justify-content: center; }
        .winner-card { border-radius: 20px; padding: 30px 20px; text-align: center; position: relative; margin-bottom: 20px; }
        .winner-card .crown { position: absolute; top: 16px; right: 20px; width: 30px; height: 30px; }
        .winner-card .lead-lbl { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 17px; font-weight: 600; margin-bottom: 10px; }
        .winner-card .lead-lbl svg { width: 20px; height: 20px; }
        .winner-card .wn { font-size: 34px; font-weight: 600; margin-bottom: 4px; }
        .winner-card .ws { font-size: 16px; color: var(--ink-2); }

        /* --- Ball sheet --- */
        .sheet-overlay { position: fixed; inset: 0; background: rgba(20,25,20,0.4); display: flex; align-items: flex-end; z-index: 40; opacity: 0; pointer-events: none; transition: opacity .18s; }
        .sheet-overlay.show { opacity: 1; pointer-events: auto; }
        .sheet { width: 100%; max-width: 480px; margin: 0 auto; background: var(--card); border-radius: 22px 22px 0 0; padding: 18px 18px 24px; max-height: 88vh; overflow-y: auto; transform: translateY(100%); transition: transform .22s; }
        .sheet-overlay.show .sheet { transform: translateY(0); }
        .sheet-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .sheet-title { font-size: 18px; font-weight: 600; }
        .sheet-x { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; color: var(--ink-3); cursor: pointer; }
        .ball-chips { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
        .chip { display: flex; align-items: center; gap: 9px; background: #f7f8f4; border: 1px solid var(--line); border-radius: 12px; padding: 9px 11px; cursor: pointer; }
        .chip.sel { border-color: var(--green); background: #eaf6ee; }
        .chip .cn { flex: 1; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .new-ball-in { width: 100%; height: 42px; border: 1px solid var(--line); border-radius: 12px; padding: 0 12px; font-size: 15px; margin-bottom: 10px; }
        .swatches { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .swatch { width: 30px; height: 30px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
        .swatch.sel { border-color: var(--ink-3); }
        .note-area { width: 100%; min-height: 72px; border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; font-size: 14px; font-family: inherit; resize: vertical; margin-bottom: 16px; }
        .sheet-actions { display: flex; gap: 10px; }
        .sheet-actions .btn { height: 48px; font-size: 15px; }

        /* --- Inline-Editor Popup (History-Edit) --- */
        .mini-overlay { position: fixed; inset: 0; background: rgba(20,25,20,0.4); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
        .mini-card { background: var(--card); border-radius: 20px; padding: 20px 20px 18px; width: 270px; max-width: 84vw; text-align: center; box-shadow: 0 12px 44px rgba(0,0,0,.2); }
        .mini-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
        .mini-card .stepper { margin-bottom: 16px; }
        .mini-card .btn { height: 46px; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink);
            color: #fff; font-size: 14px; padding: 9px 16px; border-radius: 20px; opacity: 0; transition: all .2s; z-index: 60; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div id="app" class="wrap"></div>
    <div id="sheetOverlay" class="sheet-overlay"><div id="sheet" class="sheet"></div></div>
    <div id="toast" class="toast">Gespeichert</div>

    <script>
    // ==========================================================
    // Server-gerenderte Daten
    // ==========================================================
    const GAME_ID = {{ game.id | tojson }};
    const GAME_PLACE_ID = {{ (game.place_id or 0) | tojson }};
    const PLACE_NAME = {{ game.place | tojson }};
    const GAME_DATE = {{ game.date | tojson }};
    const TRACK_COUNT = {{ track_count | tojson }};
    const PLAYERS = [{% for p in players %}{id: {{ p.id }}, name: {{ p.name | tojson }}}{{ "," if not loop.last }}{% endfor %}];

    const SCORES = {}; // "playerId-track" -> value
    {% for player in players %}{% for track in range(1, track_count + 1) %}{% set v = score_map.get((player.id, track)) %}{% if v and v > 0 %}SCORES[{{ (player.id ~ '-' ~ track) | tojson }}] = {{ v }};
    {% endif %}{% endfor %}{% endfor %}

    let BALLS_BY_PLAYER = {{ balls_by_player | tojson }};  // { name: [ {id,label,color_hex,image_filename}, ... ] }
    const CHOICES = {};  // "name|track" -> Haupt-Ball { ball, note, slot:0 }
    {% for (pname, track), choice in choice_by_player_track.items() %}CHOICES[{{ (pname ~ '|' ~ track) | tojson }}] = {{ choice | tojson }};
    {% endfor %}
    const ALT_CHOICES = {};  // "name|track" -> Alternativ-Ball { ball, slot:1 }
    {% for (pname, track), choice in alt_by_player_track.items() %}ALT_CHOICES[{{ (pname ~ '|' ~ track) | tojson }}] = {{ choice | tojson }};
    {% endfor %}

    // Analytics pro Anlage & Bahn (über alle Spiele an diesem Platz): { track: {best, worst, avg, count} }
    const TRACK_STATS = {{ track_stats | tojson }};

    // ==========================================================
    // Helpers
    // ==========================================================
    const PALETTE = [
        { main: '#16a34a', tint: '#d7ecdd', lite: '#9fd8b4' },
        { main: '#e0672e', tint: '#fbe7da', lite: '#f2c4a6' },
        { main: '#2563eb', tint: '#dbe7fb', lite: '#a9c6f4' },
        { main: '#0d9488', tint: '#d3f0eb', lite: '#8fd7cd' }
    ];
    const COLOR_SWATCHES = ['#ffffff','#111827','#6b7280','#92400e','#dc2626','#f97316','#eab308','#22c55e','#10b981','#06b6d4','#2563eb','#ec4899'];

    function colorOf(idx) { return PALETTE[idx % PALETTE.length]; }
    function playerIndex(pid) { return PLAYERS.findIndex(p => p.id === pid); }
    function nameOf(pid) { const p = PLAYERS.find(p => p.id === pid); return p ? p.name : ''; }
    function scoreOf(pid, track) { return SCORES[pid + '-' + track] || 0; }
    function totalOf(pid) { let t = 0; for (let h = 1; h <= TRACK_COUNT; h++) t += scoreOf(pid, h); return t; }
    function playedOf(pid) { let n = 0; for (let h = 1; h <= TRACK_COUNT; h++) if (scoreOf(pid, h) > 0) n++; return n; }
    function avgOf(pid) { const n = playedOf(pid); return n > 0 ? (totalOf(pid) / n).toFixed(1) : '–'; }
    function choiceOf(name, track) { return CHOICES[name + '|' + track] || null; }
    function altOf(name, track) { return ALT_CHOICES[name + '|' + track] || null; }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    function leaderId() {
        const active = PLAYERS.filter(p => playedOf(p.id) > 0);
        if (!active.length) return null;
        return active.reduce((best, p) => totalOf(p.id) < totalOf(best.id) ? p : best).id;
    }

    const IC = {
        pin: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8c0 4.5-6 10-6 10S6 12.5 6 8a6 6 0 0 1 12 0Z"/><circle cx="12" cy="8" r="2"/></svg>',
        grid: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="6" height="6" rx="1"/><rect x="14" y="4" width="6" height="6" rx="1"/><rect x="4" y="14" width="6" height="6" rx="1"/><rect x="14" y="14" width="6" height="6" rx="1"/></svg>',
        left: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>',
        right: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>',
        arrow: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>',
        pencil: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>',
        note: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2Z"/></svg>',
        plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>',
        flag: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1Z"/><path d="M4 22v-7"/></svg>',
        crown: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 8l4 4 5-7 5 7 4-4-2 12H5L3 8Z"/></svg>',
        trophy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h12v4a6 6 0 0 1-12 0V4Z"/><path d="M6 6H4a2 2 0 0 0 0 4h2M18 6h2a2 2 0 0 1 0 4h-2M9 18h6M10 18v3M14 18v-3"/></svg>',
        x: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>',
        check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>'
    };

    function ballTileHTML(color, image) {
        if (image) return '<div class="balltile"><img src="/static/ball-images/' + esc(image) + '" alt="" onerror="this.parentNode.innerHTML=\'\'"></div>';
        const c = color || '#d7d9d2';
        return '<div class="balltile"><div class="balldot" style="width:28px;height:28px;background:' + c + ';">'
            + '<div class="hl" style="top:5px;left:6px;width:6px;height:6px;"></div></div></div>';
    }

    // ==========================================================
    // State + Router
    // ==========================================================
    const FROM_HISTORY = new URLSearchParams(location.search).get('from') === 'history';
    const ORIGINAL = Object.assign({}, SCORES);  // Snapshot für Abbrechen im History-Modus
    let state = { view: 'main', playerId: null, hole: 1, editMode: false, editTile: null };

    function revertScores() {
        Object.keys(SCORES).forEach(k => delete SCORES[k]);
        Object.assign(SCORES, ORIGINAL);
    }
    const app = document.getElementById('app');

    function render() {
        if (state.view === 'detail') renderDetail();
        else if (state.view === 'winner') renderWinner();
        else renderMain();
    }

    // ---------- Hauptansicht ----------
    function renderMain() {
        const lead = leaderId();
        let cards = '';
        PLAYERS.forEach((p, i) => {
            const c = colorOf(i);
            let tiles = '';
            for (let h = 1; h <= TRACK_COUNT; h++) {
                const v = scoreOf(p.id, h);
                tiles += '<div class="htile" data-pid="' + p.id + '" data-hole="' + h + '">'
                    + '<div class="hn">' + h + '</div>'
                    + '<div class="hv" style="color:' + (v > 0 ? 'var(--ink)' : 'var(--muted)') + ';">' + (v > 0 ? v : '·') + '</div></div>';
            }
            cards += '<div class="pcard' + (p.id === lead ? ' lead' : '') + '"' + (p.id === lead ? ' style="border-color:' + c.main + ';"' : '') + '>'
                + '<div class="pcard-head" data-pid="' + p.id + '">'
                + '<span class="rank">' + (i + 1) + '</span>'
                + '<div class="avatar" style="background:' + c.tint + ';color:' + c.main + ';">' + esc(p.name.charAt(0).toUpperCase()) + '</div>'
                + '<div class="pname">' + esc(p.name) + '</div>'
                + '<div class="pmeta"><span class="tot" style="color:' + c.main + ';">' + totalOf(p.id) + '</span>'
                + '<span class="frac">· ' + playedOf(p.id) + '/' + TRACK_COUNT + '</span></div></div>'
                + '<div class="grid9">' + tiles + '</div></div>';
        });

        let stand = '';
        PLAYERS.forEach((p, i) => {
            const c = colorOf(i);
            stand += '<div class="sblock"><div class="nm" style="color:' + c.main + ';">' + esc(p.name) + '</div>'
                + '<div class="bt">' + totalOf(p.id) + '</div>'
                + '<div class="av">Ø ' + avgOf(p.id) + ' pro Bahn</div></div>';
        });

        let footer;
        if (!FROM_HISTORY) {
            footer = '<button class="btn btn-green" id="finishBtn" style="margin-top:16px;">' + IC.flag + 'Spiel beenden</button>';
        } else if (!state.editMode) {
            footer = '<button class="btn btn-ghost" id="editBtn" style="margin-top:16px;">' + IC.pencil + 'Editieren</button>';
        } else {
            footer = '<div style="display:flex;gap:10px;margin-top:16px;"><button id="cancelBtn" style="flex:1;height:52px;border-radius:14px;background:#fff;border:1px solid #e6e7e1;color:#5b5f58;font-size:16px;font-weight:600;cursor:pointer;">Abbrechen</button><button id="saveBtn" style="flex:1;height:52px;border-radius:14px;background:#16a34a;border:none;color:#fff;font-size:16px;font-weight:600;cursor:pointer;">Speichern</button></div>';
        }

        let popup = '';
        if (FROM_HISTORY && state.editMode && state.editTile) {
            const ep = state.editTile.pid, eh = state.editTile.hole, ev = scoreOf(ep, eh);
            popup = '<div class="mini-overlay" id="miniOverlay"><div class="mini-card">'
                + '<div class="mini-title">' + esc(nameOf(ep)) + ' · Bahn ' + eh + '</div>'
                + '<div class="stepper"><div class="step step-minus" id="miniMinus">−</div>'
                + '<div class="score-big">' + (ev > 0 ? ev : '–') + '</div>'
                + '<div class="step step-plus" id="miniPlus">+</div></div>'
                + '<button class="btn btn-green" id="miniDone">' + IC.check + 'Fertig</button>'
                + '</div></div>';
        }

        app.innerHTML =
            '<div style="display:flex; align-items:center; gap:12px; margin-bottom:14px;">'
            + '<div id="homeBack" style="width:40px;height:40px;border-radius:12px;background:#fff;border:1px solid #e6e7e1;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto;"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>'
            + '<div style="flex:1;"><div class="loc">' + IC.pin + '<span>' + esc(PLACE_NAME) + '</span></div>'
            + '<div style="font-size:13px;color:#8a8f88;">' + TRACK_COUNT + ' Bahnen · ' + esc(GAME_DATE) + '</div></div></div>'
            + '<div class="row-between" style="margin-bottom:10px;"><span class="section-label">SCORECARD</span>'
            + (FROM_HISTORY && state.editMode ? '<span style="font-size:12px;color:var(--ink-3);">Kachel antippen zum Ändern</span>' : '') + '</div>'
            + cards
            + '<div class="section-label" style="margin:6px 0 10px;">STAND</div>'
            + '<div class="stand">' + stand + '</div>'
            + '<div class="spacer"></div>'
            + footer
            + popup;

        // Klick auf Spieler-Kopf / Bahn-Kachel
        app.querySelectorAll('[data-pid]').forEach(el => {
            el.addEventListener('click', () => {
                const pid = parseInt(el.dataset.pid);
                const h = el.dataset.hole ? parseInt(el.dataset.hole) : null;
                if (FROM_HISTORY) {
                    // Ansichtsmodus: kein Sprung ins Spiel. Editiermodus: nur Kacheln inline bearbeiten.
                    if (!state.editMode || h === null) return;
                    state.editTile = { pid: pid, hole: h };
                    render();
                } else {
                    openDetail(pid, h);
                }
            });
        });

        if (!FROM_HISTORY) {
            document.getElementById('finishBtn').addEventListener('click', () => { state.view = 'winner'; render(); });
        } else if (!state.editMode) {
            document.getElementById('editBtn').addEventListener('click', () => { state.editMode = true; render(); });
        } else {
            document.getElementById('cancelBtn').addEventListener('click', () => { revertScores(); state.editMode = false; state.editTile = null; render(); });
            document.getElementById('saveBtn').addEventListener('click', saveHistoryEdits);
        }

        // Inline-Stepper Popup
        if (FROM_HISTORY && state.editMode && state.editTile) {
            const ep = state.editTile.pid, eh = state.editTile.hole;
            const closeMini = () => { state.editTile = null; render(); };
            document.getElementById('miniMinus').addEventListener('click', () => changeScore(ep, eh, -1));
            document.getElementById('miniPlus').addEventListener('click', () => changeScore(ep, eh, +1));
            document.getElementById('miniDone').addEventListener('click', closeMini);
            document.getElementById('miniOverlay').addEventListener('click', e => { if (e.target.id === 'miniOverlay') closeMini(); });
        }

        document.getElementById('homeBack').addEventListener('click', () => { if (history.length > 1) history.back(); else location.href = '/'; });
    }

    // ---------- Detailansicht ----------
    function openDetail(pid, startHole) {
        state.view = 'detail';
        state.playerId = pid;
        state.hole = startHole || Math.max(1, playedOf(pid));
        render();
    }

    function trackStatsHTML(name, hole) {
        const chartIc = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="12" width="3" height="6"/><rect x="12" y="8" width="3" height="10"/><rect x="17" y="4" width="3" height="14"/></svg>';
        const s = (TRACK_STATS[name] || {})[hole];
        const head = 'BAHN ' + hole + ' · ' + esc((name || '').toUpperCase()) + (s && s.count ? ' · ' + s.count + '×' : '');
        let inner;
        if (!s || !s.count) {
            inner = '<div class="tstats-empty">Noch keine eigenen Werte hier.</div>';
        } else {
            inner = '<div class="tstats">'
                + '<span class="tstat"><span class="tk">Bester</span><span class="tv" style="color:var(--green);">' + s.best + '</span></span>'
                + '<span class="tstat"><span class="tk">Ø</span><span class="tv">' + s.avg + '</span></span>'
                + '<span class="tstat"><span class="tk">Schlecht.</span><span class="tv" style="color:#e0672e;">' + s.worst + '</span></span>'
                + '</div>';
        }
        return '<div class="tstats-wrap"><div class="tstats-lbl">' + chartIc + head + '</div>' + inner + '</div>';
    }

    function renderDetail() {
        const pid = state.playerId, hole = state.hole, i = playerIndex(pid), c = colorOf(i);
        const name = nameOf(pid);
        const sc = scoreOf(pid, hole);
        const ch = choiceOf(name, hole);
        const ball = ch && ch.ball ? ch.ball : null;
        const note = ch && ch.note ? ch.note : '';

        let seg = '';
        for (let h = 1; h <= TRACK_COUNT; h++) {
            const cur = h === hole, pl = scoreOf(pid, h) > 0;
            const bg = cur ? c.main : (pl ? c.lite : '#e0e2db');
            seg += '<div class="hseg" data-jump="' + h + '" style="height:' + (cur ? 14 : 8) + 'px;background:' + bg + ';"></div>';
        }

        const ballInner = ball
            ? ballTileHTML(ball.color_hex, ball.image_filename) + '<span class="ball-name">' + esc(ball.label) + '</span>' + '<span class="icon-pencil">' + IC.pencil + '</span>'
            : ballTileHTML(null, null) + '<span class="ball-name empty">Ball wählen</span>' + '<span class="icon-pencil">' + IC.pencil + '</span>';

        const alt = altOf(name, hole);
        const altBall = alt && alt.ball ? alt.ball : null;
        const altRowHtml = altBall
            ? '<div class="ball-row" id="altRow" style="margin-bottom:14px;">' + ballTileHTML(altBall.color_hex, altBall.image_filename) + '<span class="ball-name">' + esc(altBall.label) + '</span><span style="font-size:11px;color:var(--ink-4);letter-spacing:1px;margin-right:2px;">ALT</span><span class="icon-pencil">' + IC.pencil + '</span></div>'
            : '<div class="alt-row" id="altRow" style="margin-bottom:14px;">' + IC.plus + '<span>Alternativ-Ball</span></div>';

        app.innerHTML =
            '<div class="row-between" style="margin-bottom:10px;">'
            + '<div class="loc">' + IC.pin + '<span style="font-size:15px;">' + esc(PLACE_NAME) + '</span></div>'
            + '<div class="pill-btn" id="backBtn">' + IC.grid + 'Übersicht</div></div>'
            + '<div class="idbadge">'
            + '<div class="avatar" style="background:' + c.tint + ';color:' + c.main + ';">' + esc(name.charAt(0).toUpperCase()) + '</div>'
            + '<div class="pname">' + esc(name) + '</div>'
            + '<div class="gesamt"><div class="lbl">Gesamt</div><div class="val" style="color:' + c.main + ';">' + totalOf(pid) + '</div></div></div>'
            + '<div class="holenav">'
            + '<div class="navbtn' + (hole <= 1 ? ' off' : '') + '" id="prevBtn">' + IC.left + '</div>'
            + '<div class="holenum"><div class="k">BAHN</div><div class="n">' + hole + '</div><div class="v">von ' + TRACK_COUNT + '</div></div>'
            + '<div class="navbtn' + (hole >= TRACK_COUNT ? ' off' : '') + '" id="nextBtn">' + IC.right + '</div></div>'
            + '<div class="dcard">'
            + '<div class="caption">Schläge auf Bahn ' + hole + '</div>'
            + '<div class="stepper"><div class="step step-minus" id="minus">−</div>'
            + '<div class="score-big">' + (sc > 0 ? sc : '–') + '</div>'
            + '<div class="step step-plus" id="plus">+</div></div>'
            + '<div class="field-label">BALL FÜR DIESE BAHN</div>'
            + '<div class="ball-row" id="ballRow" style="margin-bottom:8px;">' + ballInner + '</div>'
            + altRowHtml
            + '<div class="field-label">NOTIZ</div>'
            + '<div class="note-row" id="noteRow">' + IC.note + '<span class="note-txt' + (note ? '' : ' empty') + '">' + (note ? esc(note) : 'Notiz hinzufügen …') + '</span></div>'
            + (GAME_PLACE_ID ? trackStatsHTML(name, hole) : '')
            + '</div>'
            + '<div style="margin-top:14px;"><div class="holebar">' + seg + '</div>'
            + '<div class="bar-legend"><span>Bahn ' + hole + ' · antippen</span><span>' + playedOf(pid) + ' / ' + TRACK_COUNT + '</span><span>Bahn ' + TRACK_COUNT + '</span></div></div>'
            + (hole >= TRACK_COUNT
                ? '<button class="btn btn-green" id="weiterBtn" style="margin-top:12px;">' + IC.check + (playedOf(pid) >= TRACK_COUNT ? 'Mein Spiel beenden' : 'Zur Übersicht') + '</button>'
                : '<button class="btn btn-green" id="weiterBtn" style="margin-top:12px;">Weiter ' + IC.arrow + '</button>');

        document.getElementById('backBtn').addEventListener('click', () => { state.view = 'main'; render(); });
        document.getElementById('prevBtn').addEventListener('click', () => { if (hole > 1) { state.hole--; render(); } });
        document.getElementById('nextBtn').addEventListener('click', () => { if (hole < TRACK_COUNT) { state.hole++; render(); } });
        document.getElementById('weiterBtn').addEventListener('click', () => { if (hole < TRACK_COUNT) { state.hole++; render(); } else { state.view = 'main'; render(); } });
        document.getElementById('minus').addEventListener('click', () => changeScore(pid, hole, -1));
        document.getElementById('plus').addEventListener('click', () => changeScore(pid, hole, +1));
        document.getElementById('ballRow').addEventListener('click', () => openBallSheet(name, hole, 0));
        document.getElementById('noteRow').addEventListener('click', () => openBallSheet(name, hole, 0));
        document.getElementById('altRow').addEventListener('click', () => openBallSheet(name, hole, 1));
        app.querySelectorAll('[data-jump]').forEach(el => {
            el.addEventListener('click', () => { state.hole = parseInt(el.dataset.jump); render(); });
        });
    }

    function changeScore(pid, hole, delta) {
        let v = scoreOf(pid, hole) + delta;
        if (v < 0) v = 0;
        if (v === 0) delete SCORES[pid + '-' + hole];
        else SCORES[pid + '-' + hole] = v;
        render();
        if (!FROM_HISTORY) saveScore(pid, hole, v);  // im History-Modus erst bei "Speichern"
    }

    async function saveHistoryEdits() {
        const changes = [];
        PLAYERS.forEach(p => {
            for (let h = 1; h <= TRACK_COUNT; h++) {
                const k = p.id + '-' + h;
                const now = SCORES[k] || 0, orig = ORIGINAL[k] || 0;
                if (now !== orig) changes.push({ pid: p.id, track: h, value: now });
            }
        });
        try {
            for (const c of changes) {
                await fetch('/update_score', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ player_id: c.pid, track: c.track, value: c.value }) });
            }
            // Snapshot auf neuen Stand ziehen, zurück in den Ansichtsmodus (auf der Seite bleiben)
            Object.keys(ORIGINAL).forEach(k => delete ORIGINAL[k]);
            Object.assign(ORIGINAL, SCORES);
            state.editMode = false;
            state.editTile = null;
            render();
            toast(changes.length ? 'Gespeichert' : 'Keine Änderungen');
        } catch (e) { console.error('saveHistoryEdits', e); toast('⚠️ Nicht gespeichert'); }
    }

    async function saveScore(pid, track, value) {
        try {
            const res = await fetch('/update_score', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ player_id: pid, track: track, value: value })
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            if (data.status === 'success') toast('Gespeichert');
            else throw new Error(data.message || 'Fehler');
        } catch (e) {
            console.error('saveScore', e);
            toast('⚠️ Nicht gespeichert');
        }
    }

    // ---------- Gewinner ----------
    function renderWinner() {
        const active = PLAYERS.filter(p => playedOf(p.id) > 0);
        const lead = leaderId();
        const tie = active.length >= 2 && active.filter(p => totalOf(p.id) === totalOf(lead)).length > 1;
        const wi = lead != null ? playerIndex(lead) : 0;
        const c = colorOf(wi);

        let stand = '';
        PLAYERS.forEach((p, i) => {
            const cc = colorOf(i);
            stand += '<div class="sblock"><div class="nm" style="color:' + cc.main + ';">' + esc(p.name) + '</div>'
                + '<div class="bt">' + totalOf(p.id) + '</div><div class="av">Ø ' + avgOf(p.id) + ' pro Bahn</div></div>';
        });

        app.innerHTML =
            '<div class="row-between" style="margin-bottom:14px;"><span></span><div class="pill-btn" id="backBtn">' + IC.grid + 'Übersicht</div></div>'
            + '<div class="winner-wrap"><div class="winner-card" style="background:' + (tie ? '#eef0ea' : c.tint) + ';">'
            + '<span class="crown" style="color:' + (tie ? 'var(--ink-4)' : c.main) + ';">' + IC.crown + '</span>'
            + '<div class="lead-lbl" style="color:' + (tie ? 'var(--ink-2)' : c.main) + ';">' + IC.trophy + (tie ? 'Unentschieden' : 'Gewinner') + '</div>'
            + (tie || lead == null ? '' : '<div class="wn">' + esc(nameOf(lead)) + '</div><div class="ws">' + totalOf(lead) + ' Schläge · Ø ' + avgOf(lead) + '</div>')
            + '</div><div class="stand">' + stand + '</div></div>'
            + '<button class="btn btn-green" style="margin-top:16px;" onclick="location.href=\'/\'">Neues Spiel</button>'
            + '<button class="btn btn-text" id="backBtn2">Zurück zum Spiel</button>';

        document.getElementById('backBtn').addEventListener('click', () => { state.view = 'main'; render(); });
        document.getElementById('backBtn2').addEventListener('click', () => { state.view = 'main'; render(); });
    }

    // ==========================================================
    // Ball-Sheet (Ball wählen / Notiz)
    // ==========================================================
    let sheetCtx = null;

    function openBallSheet(playerName, track, slot) {
        slot = slot || 0;
        if (!GAME_PLACE_ID) { toast('Für dieses Spiel nicht verfügbar'); return; }
        const ch = slot === 1 ? altOf(playerName, track) : choiceOf(playerName, track);
        sheetCtx = {
            playerName, track, slot,
            selectedBallId: ch && ch.ball ? ch.ball.id : null,
            newColor: '#22c55e',
            note: ch && ch.note ? ch.note : ''
        };
        const balls = BALLS_BY_PLAYER[playerName] || [];

        let chips = balls.map(b =>
            '<div class="chip' + (sheetCtx.selectedBallId === b.id ? ' sel' : '') + '" data-ball="' + b.id + '">'
            + ballTileHTML(b.color_hex, b.image_filename).replace('width:40px;height:40px', 'width:28px;height:28px')
            + '<span class="cn">' + esc(b.label) + '</span></div>'
        ).join('');
        if (!chips) chips = '<div style="grid-column:1/-1;color:var(--ink-4);font-size:14px;">Noch keine Bälle — leg unten einen an.</div>';

        const swatches = COLOR_SWATCHES.map(hex =>
            '<div class="swatch' + (hex === sheetCtx.newColor ? ' sel' : '') + '" data-swatch="' + hex + '" style="background:' + hex + ';"></div>'
        ).join('');

        const titleSuffix = slot === 1 ? ' · Alternativ' : '';
        const noteSection = slot === 1 ? '' :
            '<div class="field-label">NOTIZ FÜR DIESE BAHN (OPTIONAL)</div>'
            + '<textarea class="note-area" id="noteArea" placeholder="z.B. oben rechts anzielen, sanfter Schlag …">' + esc(sheetCtx.note) + '</textarea>';
        const sheet = document.getElementById('sheet');
        sheet.innerHTML =
            '<div class="sheet-head"><div class="sheet-title">' + esc(playerName) + ' – Bahn ' + track + titleSuffix + '</div>'
            + '<div class="sheet-x" id="sheetClose">' + IC.x + '</div></div>'
            + '<div class="field-label">DEINE BÄLLE</div>'
            + '<div class="ball-chips" id="ballChips">' + chips + '</div>'
            + '<div class="field-label">NEUER BALL</div>'
            + '<input class="new-ball-in" id="newBallLabel" placeholder="z.B. hellblau, springender Ball" maxlength="100" autocomplete="off">'
            + '<div class="swatches" id="swatches">' + swatches + '</div>'
            + noteSection
            + '<div class="sheet-actions"><button class="btn btn-ghost" id="sheetCancel">Abbrechen</button>'
            + '<button class="btn btn-green" id="sheetSave">Speichern</button></div>';

        sheet.querySelectorAll('[data-ball]').forEach(el => el.addEventListener('click', () => {
            sheetCtx.selectedBallId = parseInt(el.dataset.ball);
            document.getElementById('newBallLabel').value = '';
            sheet.querySelectorAll('.chip').forEach(c => c.classList.remove('sel'));
            el.classList.add('sel');
        }));
        sheet.querySelectorAll('[data-swatch]').forEach(el => el.addEventListener('click', () => {
            sheetCtx.newColor = el.dataset.swatch;
            sheet.querySelectorAll('.swatch').forEach(s => s.classList.remove('sel'));
            el.classList.add('sel');
        }));
        document.getElementById('sheetClose').addEventListener('click', closeSheet);
        document.getElementById('sheetCancel').addEventListener('click', closeSheet);
        document.getElementById('sheetSave').addEventListener('click', saveSheet);
        document.getElementById('sheetOverlay').classList.add('show');
    }

    function closeSheet() { document.getElementById('sheetOverlay').classList.remove('show'); sheetCtx = null; }

    async function saveSheet() {
        if (!sheetCtx) return;
        const label = (document.getElementById('newBallLabel').value || '').trim();
        const noteEl = document.getElementById('noteArea');
        const note = noteEl ? (noteEl.value || '').trim() : '';
        const payload = { place_id: GAME_PLACE_ID, track_number: sheetCtx.track, player_name: sheetCtx.playerName, slot: sheetCtx.slot, note: note || null };
        if (label) payload.ball = { label: label, color_hex: sheetCtx.newColor };
        else if (sheetCtx.selectedBallId) payload.ball_id = sheetCtx.selectedBallId;

        if (!payload.ball && !payload.ball_id && !payload.note) { closeSheet(); return; }

        try {
            const res = await fetch('/api/track-choice', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (data.status !== 'success') throw new Error(data.message || 'Fehler');
            const key = sheetCtx.playerName + '|' + sheetCtx.track;
            if (sheetCtx.slot === 1) ALT_CHOICES[key] = data.choice;
            else CHOICES[key] = data.choice;
            // Neuer Ball ins Inventar aufnehmen, falls angelegt
            if (data.choice.ball) {
                const list = BALLS_BY_PLAYER[sheetCtx.playerName] || (BALLS_BY_PLAYER[sheetCtx.playerName] = []);
                if (!list.some(b => b.id === data.choice.ball.id)) list.unshift(data.choice.ball);
            }
            closeSheet();
            toast('Gespeichert');
            render();
        } catch (e) {
            console.error('saveSheet', e);
            toast('⚠️ Nicht gespeichert');
        }
    }

    // ==========================================================
    let toastTimer = null;
    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 1400);
    }
    document.getElementById('sheetOverlay').addEventListener('click', e => { if (e.target.id === 'sheetOverlay') closeSheet(); });

    render();
    </script>
</body>
</html>
